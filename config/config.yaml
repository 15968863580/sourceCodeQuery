# ============================================================================
# MCP 源码查询服务 - 配置文件
# ============================================================================
# 配置中的 ${ENV_VAR} 会被自动替换为对应的环境变量值
# 环境变量可以在系统环境变量或 .env 文件中设置

# ----------------------------------------------------------------------------
# MCP Server 传输配置
# ----------------------------------------------------------------------------
server:
  transport: stdio            # 传输模式：stdio（标准输入输出，供 MCP 客户端连接）| sse（HTTP 服务）
  port: 8080                  # SSE 模式时监听的端口号，stdio 模式下忽略此项

# ----------------------------------------------------------------------------
# GitLab 连接配置（局域网 GitLab 实例）
# ----------------------------------------------------------------------------
gitlab:
  url: "https://gitlab.local.example.com"   # GitLab 实例地址，不含末尾斜杠
  username: "${GITLAB_USERNAME}"             # GitLab 登录用户名（通过环境变量注入）
  password: "${GITLAB_PASSWORD}"             # GitLab 登录密码（通过环境变量注入）
  # 要同步的项目列表，可配置多个项目
  projects:
    - id: "backend-service"                 # 项目唯一标识，用于内部隔离（代码存储、索引、记忆 namespace）
      name: "后端服务"                        # 项目显示名称
      source_url: "https://gitlab.local.example.com/team/backend-service"  # GitLab 项目源码 URL，用于提取项目路径
      default_branch: "main"                # 默认拉取的分支名
      language: "java"                      # 项目主要编程语言（用于代码解析和索引）
    - id: "frontend-app"                    # 第二个项目
      name: "前端应用"
      source_url: "https://gitlab.local.example.com/team/frontend-app"
      default_branch: "develop"             # 前端项目使用 develop 分支
      language: "typescript"                # TypeScript 项目

# ----------------------------------------------------------------------------
# 大语言模型（LLM）配置
# 用于代码深度解读（ReAct Agent 推理循环）和同步摘要生成
# 支持任何兼容 OpenAI API 的服务（OpenAI、Azure OpenAI、Ollama、vLLM 等）
# ----------------------------------------------------------------------------
llm:
  base_url: "https://api.openai.com/v1"     # LLM API 基础地址（OpenAI 或兼容服务的 API 端点）
  api_key: "${LLM_API_KEY}"                 # API 密钥（通过环境变量注入）
  model: "gpt-4o"                           # 主模型 ID，用于代码深度解读（建议使用强模型，如 gpt-4o）
  summary_model: "gpt-4o-mini"              # 摘要模型 ID，用于定时同步时生成变更摘要（可用轻量模型降低成本）
  temperature: 0.3                          # 生成温度：0=确定性，1=创造性，代码分析建议 0.2-0.4
  max_reasoning_steps: 15                   # LLM Agent 推理循环最大步数（每步可调用一个代码导航工具）
  max_tokens_per_read: 8000                 # 单次 read_file 返回的最大字符数，超过则返回符号概览引导精确读取

# ----------------------------------------------------------------------------
# Embedding 向量模型配置
# 用于代码语义索引和搜索，将代码文本转换为向量进行相似度检索
# 通常使用与 LLM 相同的 API 提供商
# ----------------------------------------------------------------------------
embedding:
  base_url: "https://api.openai.com/v1"     # Embedding API 基础地址
  api_key: "${LLM_API_KEY}"                 # API 密钥（通常与 LLM 共用）
  model: "text-embedding-3-small"           # Embedding 模型 ID（text-embedding-3-small 性价比高）

# ----------------------------------------------------------------------------
# 代码索引配置（ChromaDB 向量数据库）
# 将源码文件分块后生成向量索引，支持语义搜索和关键词搜索
# ----------------------------------------------------------------------------
index:
  storage_path: "./data/index"              # ChromaDB 持久化存储路径（向量索引数据）
  chunk_size: 500                           # 代码分块大小（按行数），每个 chunk 包含此行数的代码
  chunk_overlap: 50                         # 相邻 chunk 的重叠行数，确保跨块代码的上下文连续性

# ----------------------------------------------------------------------------
# 定时调度器配置（APScheduler）
# 定时从 GitLab 拉取最新源码，更新索引和调用图
# ----------------------------------------------------------------------------
scheduler:
  sync_interval_cron: "*/30 * * * *"        # 同步间隔（Cron 表达式）：*/30 表示每 30 分钟同步一次
  # Cron 格式：分 时 日 月 周
  # 示例："0 */2 * * *" = 每 2 小时，"0 9 * * 1-5" = 工作日每天 9 点
  full_sync_on_start: true                  # 服务启动时是否立即执行一次全量同步（首次运行必须为 true）

# ----------------------------------------------------------------------------
# 记忆服务配置（openviking）
# openviking 是外部记忆存储服务，用于持久化项目的代码理解、架构记忆、问答历史等
# 每个项目的记忆通过 namespace 隔离，互不干扰
# ----------------------------------------------------------------------------
memory:
  openviking_endpoint: "${OPENVIKING_ENDPOINT}"       # openviking 服务地址，如 http://openviking.local:8000
  openviking_account: "${OPENVIKING_ACCOUNT}"         # openviking 账户名（用于认证）
  openviking_user: "${OPENVIKING_USER}"               # openviking 用户名（用于认证）
  openviking_api_key: "${OPENVIKING_API_KEY}"         # openviking API 密钥（用于认证）
  openviking_agent: "${OPENVIKING_AGENT}"             # openviking Agent 标识（区分不同 AI 代理的记忆空间）
  # 各项目的记忆 namespace 配置，用于隔离不同项目的记忆数据
  projects:
    backend-service:                                   # 项目 ID（与上方 gitlab.projects[].id 对应）
      namespace: "proj_backend"                        # 该项目在 openviking 中的 namespace
    frontend-app:
      namespace: "proj_frontend"
  global_namespace: "global"                           # 全局 namespace，存储跨项目的通用记忆

# ----------------------------------------------------------------------------
# 数据目录（运行时自动创建）
# ----------------------------------------------------------------------------
data_dir: "./data"                                    # 所有运行时数据的根目录（代码缓存、索引等）
